<!DOCTYPE html>
<html>
<head>
<title>Edit Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="toggle" onclick="toggleMode()" id="modeBtn">🌙 Dark</div>

<header class="topbar">
<img src="logo.png" class="logo">
<h1 class="brand">KnowShare</h1>
</header>

<div class="profile-page glass">

<h2>Edit Profile</h2>

<img id="avatarPreview" class="profile-avatar">

<input id="name" placeholder="Name">
<input id="bio" placeholder="Bio">
<input type="file" id="avatarInput">

<button onclick="saveProfile()">Save Profile</button>
<button onclick="location='profile.html'">Back</button>

</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,doc,getDoc,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCFqcGqSl5OWEpG5W3lErLcyvN9kdVLl0Y",
authDomain:"knowshare-ba073.firebaseapp.com",
projectId:"knowshare-ba073",
storageBucket:"knowshare-ba073.firebasestorage.app",
messagingSenderId:"5820818323",
appId:"1:5820818323:web:103961c761a25cd5437e66"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let userId;

onAuthStateChanged(auth,async user=>{
if(!user) location="index.html";

userId=user.uid;

const snap=await getDoc(doc(db,"users",user.uid));
const data=snap.data();

document.getElementById("name").value=data.name;
document.getElementById("bio").value=data.bio;
document.getElementById("avatarPreview").src=data.avatar;
});

window.saveProfile=async()=>{

const name=document.getElementById("name").value;
const bio=document.getElementById("bio").value;
const file=document.getElementById("avatarInput").files[0];

let avatarURL=avatarPreview.src;

if(file){
const reader=new FileReader();
reader.onloadend=async()=>{
avatarURL=reader.result;

await updateDoc(doc(db,"users",userId),{
name:name,
bio:bio,
avatar:avatarURL
});

alert("Saved!");
location="profile.html";
};
reader.readAsDataURL(file);

}else{
await updateDoc(doc(db,"users",userId),{
name:name,
bio:bio,
avatar:avatarURL
});

alert("Saved!");
location="profile.html";
}
};
</script>

<script>
function toggleMode(){
document.body.classList.toggle("light");
const btn=document.getElementById("modeBtn");
btn.innerText=document.body.classList.contains("light")?"🌞 Light":"🌙 Dark";
}
</script>

</body>
</html>
